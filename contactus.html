        <script>
            document.addEventListener("DOMContentLoaded", function() {
            // Get the dropdown element and all form sections
            const selectElement = document.getElementById('formSelector');
            const formSections = document.querySelectorAll('.formSection');

                // Add an event listener for the 'change' event
                selectElement.addEventListener('change', function() {
                    const selectedValue = this.value;

                    // Hide all form sections first
                    formSections.forEach(section => {
                        section.style.display = 'none';
                    });

                    // Show the selected section if a valid value is chosen
                    if (selectedValue && selectedValue !== "") {
                        const selectedSection = document.getElementById(selectedValue);
                        if (selectedSection) {
                        selectedSection.style.display = 'block';
                        }
                    }
                });
            });
        </script>
